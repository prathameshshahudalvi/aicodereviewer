name: Code Reviewer

on:
    push:
        branches: ["main"]

permissions:
    contents: read

jobs:
    review:
        runs-on: ubuntu-latest
        steps:
            - uses: action/checkout@v4
            - uses: action/setup-python@v4
              with:
                python-version: "3.10"
            - name: Install Dependencies
              run: pip install -r requirements.txt
            - name: Run Review Scripts
              run: python codereviewer.py
